<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/api/">
    <title>Каталог ТМЦ - Система учета ТМЦ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <a href="mol-dashboard.html" class="app-logo">
            <img src="images/logo.png" alt="ТМЦ" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span class="app-logo-placeholder" style="display: none;">ТМЦ</span>
        </a>
        <nav class="header-nav">
            <a href="mol-dashboard.html">На главную</a>
            <a href="mol-catalog.html" class="active">Каталог</a>
            <a href="mol-requests.html">Заявки</a>
            <a href="mol-history.html">История</a>
        </nav>
        <div class="header-user">
            <div class="header-user-icon">М</div>
            <span id="headerUserName">МОЛ</span>
        </div>
    </header>
    <div class="app-container">
        <div class="app-body">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>МОЛ</h2></div>
            <nav class="sidebar-nav">
                <a href="mol-dashboard.html" class="nav-item"><span>Главная</span></a>
                <a href="mol-catalog.html" class="nav-item active"><span>Каталог ТМЦ</span></a>
                <a href="mol-requests.html" class="nav-item"><span>Заявки</span></a>
                <a href="mol-history.html" class="nav-item"><span>История</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar">М</div>
                    <div class="user-details">
                        <div class="user-name"></div>
                        <div class="user-role"></div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Выход</button>
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <header class="page-header">
                <h1>Каталог ТМЦ</h1>
            </header>
            
            <!-- Панель фильтров и инструментов -->
            <div class="content-section">
                <div class="toolbar">
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <select id="warehouseFilter" onchange="applyFilters()">
                            <option value="">Все склады</option>
                            <option value="CONSUMABLES">Склад расходных материалов</option>
                            <option value="SPARE_PARTS">Склад запасных частей</option>
                            <option value="COMPONENTS">Склад комплектующих</option>
                        </select>
                        
                        <select id="categoryFilter" onchange="applyFilters()">
                            <option value="">Все категории</option>
                        </select>
                        
                        <select id="stockFilter" onchange="applyFilters()">
                            <option value="">Все остатки</option>
                            <option value="in-stock">В наличии</option>
                            <option value="low-stock">Низкий запас</option>
                            <option value="out-of-stock">Отсутствует</option>
                        </select>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="searchInput" placeholder="Поиск по коду или названию..." style="width: 300px;">
                        <button class="btn btn-primary btn-sm" onclick="searchMaterials()">🔍 Поиск</button>
                        <button class="btn btn-success btn-sm" onclick="openAddMaterialModal()">➕ Добавить материал</button>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Код</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Склад</th>
                                <th>Расположение</th>
                                <th>Остаток</th>
                                <th>Ед. изм.</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="catalogTable">
                            <tr>
                                <td colspan="9" class="text-center">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        </div>
    </div>
    <!-- Модальное окно добавления/редактирования материала -->
    <div id="materialModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Добавить материал</h3>
                <button class="modal-close" onclick="closeModal('materialModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="materialForm">
                    <input type="hidden" id="materialId">
                    
                    <div class="form-group">
                        <label for="materialCode">Код материала *</label>
                        <input type="text" id="materialCode" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="materialName">Название *</label>
                        <input type="text" id="materialName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="warehouseType">Склад *</label>
                        <select id="warehouseType" required>
                            <option value="">Выберите склад...</option>
                            <option value="CONSUMABLES">Склад расходных материалов</option>
                            <option value="SPARE_PARTS">Склад запасных частей</option>
                            <option value="COMPONENTS">Склад комплектующих</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="categorySelect">Категория *</label>
                        <select id="categorySelect" required>
                            <option value="">Выберите категорию...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="storageLocation">Расположение на складе</label>
                        <input type="text" id="storageLocation" placeholder="Например: Стеллаж 3, Полка 2">
                    </div>
                    
                    <div class="form-group">
                        <label for="unitOfMeasure">Единица измерения *</label>
                        <input type="text" id="unitOfMeasure" required placeholder="шт, кг, л и т.д.">
                    </div>
                    
                    <div class="form-group">
                        <label for="currentQuantity">Текущий остаток</label>
                        <input type="number" id="currentQuantity" step="0.001" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="minQuantity">Минимальный остаток</label>
                        <input type="number" id="minQuantity" step="0.001">
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Описание</label>
                        <textarea id="description"></textarea>
                    </div>
                    
                    <div id="modalError" class="error-message" style="display: none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('materialModal')">Отмена</button>
                <button class="btn btn-primary" onclick="saveMaterial()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="js/common.js"></script>
    <script src="js/mol-catalog.js"></script>
</body>
</html>
