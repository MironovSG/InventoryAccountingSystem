<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/api/">
    <title>Система учета ТМЦ - Вход</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo" id="loginLogo"></div>
                <div class="login-logo-placeholder" id="loginLogoPlaceholder">ТМЦ склад</div>
                <h1>Система учета ТМЦ</h1>
                <p>Вход в систему</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" placeholder="Введите логин" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-block">ВОЙТИ</button>
            </form>
            
            <div class="login-footer">
                <p>Тестовые пользователи:</p>
                <ul>
                    <li><strong>admin</strong> / admin123 (Администратор)</li>
                    <li><strong>mol_user</strong> / mol123 (МОЛ)</li>
                    <li><strong>engineer_user</strong> / engineer123 (Инженер)</li>
                    <li><strong>manager_user</strong> / manager123 (Руководитель)</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        (function() {
            var logo = document.getElementById('loginLogo');
            var placeholder = document.getElementById('loginLogoPlaceholder');
            var img = new Image();
            img.onload = function() {
                logo.style.backgroundImage = 'url(images/logo.png)';
                logo.style.display = 'block';
                placeholder.style.display = 'none';
            };
            img.onerror = function() {
                placeholder.style.display = 'block';
            };
            img.src = 'images/logo.png';
        })();
    </script>
</body>
</html>
