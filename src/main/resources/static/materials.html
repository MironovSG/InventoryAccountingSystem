<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Материалы - Система учета ТМЦ</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Боковое меню -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Система ТМЦ</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Панель управления</span>
                </a>
                <a href="/materials.html" class="nav-item active">
                    <span class="nav-icon">📦</span>
                    <span>Материалы</span>
                </a>
                <a href="/requests.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span>Заявки</span>
                </a>
                <a href="/movements.html" class="nav-item" id="movementsLink">
                    <span class="nav-icon">🔄</span>
                    <span>Движения</span>
                </a>
                <a href="/users.html" class="nav-item" id="usersLink">
                    <span class="nav-icon">👥</span>
                    <span>Пользователи</span>
                </a>
                <a href="/reports.html" class="nav-item" id="reportsLink">
                    <span class="nav-icon">📈</span>
                    <span>Отчеты</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name"></div>
                        <div class="user-role"></div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Выход</button>
            </div>
        </aside>
        
        <!-- Основной контент -->
        <main class="main-content">
            <header class="page-header">
                <h1>Материалы (ТМЦ)</h1>
            </header>
            
            <!-- Панель инструментов -->
            <div class="content-section">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск по артикулу или названию...">
                        <button onclick="searchMaterials()">🔍</button>
                    </div>
                    <div>
                        <select id="filterSelect" onchange="filterMaterials()">
                            <option value="all">Все материалы</option>
                            <option value="in-stock">В наличии</option>
                            <option value="low-stock">Низкий запас</option>
                            <option value="critical-stock">Критический запас</option>
                            <option value="out-of-stock">Отсутствуют</option>
                        </select>
                        <button class="btn btn-primary btn-sm" onclick="openModal('addMaterialModal')" id="addMaterialBtn">+ Добавить материал</button>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Статус</th>
                                <th>Артикул</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Остаток</th>
                                <th>Мин. запас</th>
                                <th>Ед. изм.</th>
                                <th>Цена</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="materialsTable">
                            <tr>
                                <td colspan="9" class="text-center">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно добавления материала -->
    <div id="addMaterialModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Добавить материал</h3>
                <button class="modal-close" onclick="closeModal('addMaterialModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addMaterialForm">
                    <div class="form-group">
                        <label for="article">Артикул *</label>
                        <input type="text" id="article" name="article" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Название *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Описание</label>
                        <textarea id="description" name="description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="categoryId">Категория *</label>
                        <select id="categoryId" name="categoryId" required>
                            <option value="">Выберите категорию...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="unitOfMeasure">Единица измерения *</label>
                        <input type="text" id="unitOfMeasure" name="unitOfMeasure" required placeholder="шт, кг, л и т.д.">
                    </div>
                    <div class="form-group">
                        <label for="currentQuantity">Текущий остаток</label>
                        <input type="number" id="currentQuantity" name="currentQuantity" step="0.001" value="0">
                    </div>
                    <div class="form-group">
                        <label for="minQuantity">Минимальный остаток</label>
                        <input type="number" id="minQuantity" name="minQuantity" step="0.001">
                    </div>
                    <div class="form-group">
                        <label for="criticalQuantity">Критический остаток</label>
                        <input type="number" id="criticalQuantity" name="criticalQuantity" step="0.001">
                    </div>
                    <div class="form-group">
                        <label for="unitPrice">Цена за единицу</label>
                        <input type="number" id="unitPrice" name="unitPrice" step="0.01">
                    </div>
                    <div id="modalError" class="error-message" style="display: none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addMaterialModal')">Отмена</button>
                <button class="btn btn-primary" onclick="saveMaterial()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="/js/common.js"></script>
    <script>
        // Загрузка материалов
        let allMaterials = [];
        
        document.addEventListener('DOMContentLoaded', async function() {
            await loadCategories();
            await loadMaterials();
            
            // Проверка прав доступа
            const user = getCurrentUser();
            if (user.role === 'ENGINEER') {
                document.getElementById('addMaterialBtn').style.display = 'none';
            }
        });
        
        async function loadCategories() {
            try {
                const categories = await apiRequest('/material-categories/active');
                const select = document.getElementById('categoryId');
                select.innerHTML = '<option value="">Выберите категорию...</option>';
                categories.forEach(cat => {
                    select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }
        
        async function loadMaterials() {
            try {
                allMaterials = await apiRequest('/materials/active');
                displayMaterials(allMaterials);
            } catch (error) {
                console.error('Error loading materials:', error);
                document.getElementById('materialsTable').innerHTML = 
                    '<tr><td colspan="9" class="text-center">Ошибка загрузки данных</td></tr>';
            }
        }
        
        function displayMaterials(materials) {
            const tbody = document.getElementById('materialsTable');
            if (materials.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">Нет материалов</td></tr>';
                return;
            }
            
            tbody.innerHTML = materials.map(material => `
                <tr>
                    <td>${getStockLevelIndicator(material.stockLevel)}</td>
                    <td>${material.article}</td>
                    <td>${material.name}</td>
                    <td>${material.categoryName}</td>
                    <td>${formatNumber(material.currentQuantity, 0)}</td>
                    <td>${material.minQuantity ? formatNumber(material.minQuantity, 0) : '-'}</td>
                    <td>${material.unitOfMeasure}</td>
                    <td>${material.unitPrice ? formatNumber(material.unitPrice) + ' ₽' : '-'}</td>
                    <td>
                        <button class="btn btn-info btn-sm" onclick="viewMaterial(${material.id})">Просмотр</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function filterMaterials() {
            const filter = document.getElementById('filterSelect').value;
            let materials;
            
            try {
                switch(filter) {
                    case 'in-stock':
                        materials = await apiRequest('/materials/in-stock');
                        break;
                    case 'low-stock':
                        materials = await apiRequest('/materials/low-stock');
                        break;
                    case 'critical-stock':
                        materials = await apiRequest('/materials/critical-stock');
                        break;
                    case 'out-of-stock':
                        materials = await apiRequest('/materials/out-of-stock');
                        break;
                    default:
                        materials = allMaterials;
                }
                displayMaterials(materials);
            } catch (error) {
                console.error('Error filtering materials:', error);
            }
        }
        
        async function searchMaterials() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                displayMaterials(allMaterials);
                return;
            }
            
            try {
                const materials = await apiRequest(`/materials/search?query=${encodeURIComponent(query)}`);
                displayMaterials(materials);
            } catch (error) {
                console.error('Error searching materials:', error);
            }
        }
        
        async function saveMaterial() {
            const form = document.getElementById('addMaterialForm');
            const formData = new FormData(form);
            
            const data = {
                article: formData.get('article'),
                name: formData.get('name'),
                description: formData.get('description'),
                categoryId: parseInt(formData.get('categoryId')),
                unitOfMeasure: formData.get('unitOfMeasure'),
                currentQuantity: parseFloat(formData.get('currentQuantity') || 0),
                minQuantity: formData.get('minQuantity') ? parseFloat(formData.get('minQuantity')) : null,
                criticalQuantity: formData.get('criticalQuantity') ? parseFloat(formData.get('criticalQuantity')) : null,
                unitPrice: formData.get('unitPrice') ? parseFloat(formData.get('unitPrice')) : null,
                active: true
            };
            
            try {
                await apiRequest('/materials', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                closeModal('addMaterialModal');
                form.reset();
                await loadMaterials();
                alert('Материал успешно добавлен');
            } catch (error) {
                showError(error.message, 'modalError');
            }
        }
        
        function viewMaterial(id) {
            // Здесь можно реализовать страницу просмотра/редактирования материала
            alert('Просмотр материала ID: ' + id);
        }
    </script>
</body>
</html>
