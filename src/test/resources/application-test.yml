# Профиль тестирования: in-memory H2, отключение Flyway, JWT для тестов
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  sql:
    init:
      mode: never

# В тестах context-path не задаём — MockMvc обращается к корню
app:
  jwt:
    secret: testJwtSecretKeyForTokenGenerationMinLength64CharactersRequiredForHS256Encoding!!
    expiration: 86400000

logging:
  level:
    root: WARN
    com.systemtmc: INFO
